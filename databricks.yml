# Databricks Asset Bundle — deploys this dbt project as a Databricks Workflow
# that runs `dbt deps && dbt build` against a serverless SQL warehouse. The dbt
# models execute on the warehouse; the bundle schedules and wraps the run.
# Single `dev` target on the free workspace (multi-env prod/staging promotion is
# deliberately out of the MVP scope). Docs: https://docs.databricks.com/dev-tools/bundles/
#
# Honest status: authored from this repo's dbt config — NOT yet deployed or run
# against the workspace. Verify with `databricks bundle validate` then a first
# `databricks bundle deploy` / `run` when we connect (see docs/progress.md).
#
# Auth is never stored here. The Databricks CLI uses your environment/OAuth
# (DATABRICKS_HOST + token, or `databricks auth login`). No secrets in this file.

bundle:
  name: credit-decisioning-lakehouse

variables:
  warehouse_id:
    description: Serverless SQL warehouse the dbt models build against
    default: f871f96e97724dca
  catalog:
    description: Unity Catalog catalog for dbt outputs (matches DBT_CATALOG)
    default: workspace
  schema:
    description: Target schema for dbt outputs (matches DBT_SCHEMA)
    default: credit_dev

# Sync only what dbt needs to build — keep the workspace copy lean.
sync:
  include:
    - dbt_project.yml
    - packages.yml
    - package-lock.yml
    - models/**
    - macros/**
    - seeds/**
    - tests/**
    - snapshots/**

resources:
  jobs:
    dbt_build:
      name: credit-decisioning dbt build
      tasks:
        - task_key: dbt_build
          dbt_task:
            # dbt_project.yml lives at the sync root.
            project_directory: ""
            # Databricks generates the connection profile from these — no token
            # needed, the job runs as the deploying user's identity.
            catalog: ${var.catalog}
            schema: ${var.schema}
            warehouse_id: ${var.warehouse_id}
            commands:
              - "dbt deps"
              - "dbt build"
          environment_key: dbt_env
      # Serverless task compute that runs the dbt CLI (Free Edition is
      # serverless-only). The SQL itself runs on the warehouse above.
      # VERIFY the serverless dbt-task shape on first `bundle deploy`.
      environments:
        - environment_key: dbt_env
          spec:
            environment_version: "2"
            dependencies:
              - "dbt-databricks>=1.8,<1.9"

targets:
  dev:
    mode: development
    default: true
    workspace:
      # Free Databricks workspace.
      host: https://dbc-5604c867-d90d.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.target}/${bundle.name}
