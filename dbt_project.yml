name: "credit_decisioning_lakehouse"
version: "0.1.0"
config-version: 2

profile: "credit_decisioning_lakehouse"

# Adverse-action policy knobs (illustrative). decline_threshold is the
# predicted-PD cutoff above which an applicant is treated as declined;
# adverse_action_sample_size caps how many of the highest-risk declines get an
# LLM-generated reason (ai_query is metered, so the demo bounds the batch and
# the README discloses it scales to the full declined population).
vars:
  decline_threshold: 0.30
  adverse_action_sample_size: 500
  # Databricks foundation-model endpoint that ai_query calls for the
  # adverse-action explanations. A built-in serverless endpoint on the free
  # tier -- the LLM stays inside the lakehouse (no external API, no secret).
  aa_llm_endpoint: databricks-meta-llama-3-3-70b-instruct

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Medallion layering mapped onto dbt's staging -> intermediate -> marts.
models:
  credit_decisioning_lakehouse:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
    marts:
      +materialized: table
      +schema: marts
