# Project configuration for credit-decisioning-lakehouse.
# Read by the Python tooling AROUND dbt (raw-data load, the PD model, the AI
# layer) — NOT by dbt itself (dbt uses dbt_project.yml + profiles.yml). This
# keeps the non-dbt knobs in one place. Workspace IDs match databricks.yml.
#
# Status: all three layers (dbt transform, ML, grounded AI) are built and run
# live against the free workspace — the endpoints and knobs below reflect what
# actually ran (see README + MODEL_CARD.md), not a roadmap.

workspace:
  host: https://dbc-5604c867-d90d.cloud.databricks.com   # free Databricks workspace
  warehouse_id: f871f96e97724dca                          # serverless SQL warehouse

# Unity Catalog targets — mirror the profiles.yml env_var defaults.
unity_catalog:
  catalog: workspace
  raw_schema: home_credit_raw    # bronze: raw Home Credit tables land here
  dbt_schema: credit_dev         # dbt staging/marts build under here

# Home Credit Default Risk raw tables loaded into the bronze schema.
# Static historical dataset (Kaggle) — not a live feed (honest disclaimer).
raw_data:
  source: "kaggle:home-credit-default-risk"
  tables:
    - application_train
    - bureau
    - installments_payments   # feeds the incremental fct_installment_payments fact
  # Remaining tables (bureau_balance, previous_application, POS_CASH_balance,
  # credit_card_balance) load as feature sources are added.

# Traditional ML — probability-of-default model (built; tracked in local MLflow).
ml_model:
  experiment_name: /Shared/credit-decisioning-pd
  algorithm: lightgbm
  target: is_default
  # Raw probabilities are kept: isotonic recalibration moved Brier by +0.0001
  # (no improvement) on this model — see MODEL_CARD.md.
  calibration: none

# AI layer — grounded-only; no LLM in the prediction path. Built and live.
#   (1) SHAP-grounded adverse-action explanations (ai_query, in dbt)
#   (2) validated NL->SQL portfolio analytics (ai/nl_to_sql.py)
# In-lakehouse foundation-model endpoint on the free tier (no external API).
ai_layer:
  llm_endpoint: databricks-meta-llama-3-3-70b-instruct
  temperature: 0.2
  max_tokens: 1000
