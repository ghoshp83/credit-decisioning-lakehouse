name: ci

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel an in-flight run when a newer commit lands on the same ref, so rapid
# pushes don't queue redundant offline gates.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # CI is an OFFLINE gate: `dbt parse` + sqlfluff/ruff lint validate project
    # structure and SQL, and never connect to Databricks. These are deliberately
    # fake placeholders (not secrets) that satisfy profile rendering so dbt can
    # parse. Real runs happen locally against a live workspace — see README.
    env:
      DATABRICKS_HOST: "dbc-ci-placeholder.cloud.databricks.com"
      DATABRICKS_HTTP_PATH: "/sql/1.0/warehouses/ci-placeholder"
      DATABRICKS_TOKEN: "ci-offline-parse-only-not-a-real-token"
      DBT_CATALOG: "workspace"
      DBT_SCHEMA: "ci"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # uv is the project's standard installer (README run-it + the ml/ai envs
      # all use it); using it in CI too keeps one toolchain and caches resolves.
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -r requirements-dev.txt

      - name: Provision dbt profile
        run: |
          mkdir -p ~/.dbt
          cp profiles.yml.example ~/.dbt/profiles.yml

      - name: dbt deps
        run: dbt deps

      - name: dbt parse (project validity)
        run: dbt parse

      - name: SQL lint (sqlfluff)
        # Lint every SQL surface, not just models: analyses (grounding metrics)
        # and singular tests (the adverse-action grounding gate) are real SQL
        # and must pass the same offline gate.
        run: sqlfluff lint models analyses tests --dialect databricks

      - name: Python lint (ruff)
        run: ruff check .

      - name: Python format check (ruff)
        run: ruff format --check .
