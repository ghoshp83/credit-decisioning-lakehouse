version: 2

models:
  - name: stg_applications
    description: >
      Cleaned, renamed one-row-per-application view over the raw
      application_train table. Silver-layer entry point for the feature marts.
    columns:
      - name: application_id
        description: Surrogate key of the loan application (raw SK_ID_CURR).
        data_tests:
          - not_null
          - unique
      - name: is_default
        description: Target label — 1 if the client had payment difficulties, else 0.
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]
      - name: income_total
        description: Total declared client income.
        data_tests:
          - not_null
      - name: employment_years
        description: >
          Years employed at application. Null where the raw DAYS_EMPLOYED
          sentinel (365243 = not employed) was scrubbed in staging.
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100

  - name: stg_bureau
    description: >
      Cleaned one-row-per-bureau-credit view over the raw bureau table — prior
      credits at other institutions. Grain is the bureau credit, not the
      application; rolled up to applicant level in int_bureau_aggregations.
    columns:
      - name: bureau_credit_id
        description: Surrogate key of the bureau credit (raw SK_ID_BUREAU).
        data_tests:
          - not_null
          - unique
      - name: application_id
        description: FK to stg_applications (raw SK_ID_CURR).
        data_tests:
          - not_null
      - name: credit_status
        description: Bureau-reported status of the credit (Active, Closed, etc.).
        data_tests:
          - not_null

  - name: stg_installments
    description: >
      Cleaned one-row-per-installment-payment view over the raw
      installments_payments table — repayment history for prior Home Credit
      credits. Grain is the payment event (a single scheduled installment may
      be paid in parts), keyed by the payment_id surrogate. Feeds the
      incremental fct_installment_payments fact. No relationships test on
      application_id: installments cover both train and test applicants, so
      ids legitimately absent from stg_applications are expected, not orphans.
    columns:
      - name: payment_id
        description: >
          Surrogate key of the payment event — md5 over (sk_id_prev,
          version, number, entry_day, amount), the verified-unique business
          grain. The MERGE key for the incremental fact.
        data_tests:
          - not_null
      - name: application_id
        description: FK to the application (raw SK_ID_CURR); spans train + test.
        data_tests:
          - not_null
      - name: installment_due_day
        description: Scheduled installment day (negative offset from application).
        data_tests:
          - not_null

unit_tests:
  - name: test_stg_applications_scrubs_not_employed_sentinel
    description: >
      DAYS_EMPLOYED = 365243 is Home Credit's "not employed" sentinel; left
      as-is it divides to ~ -1000 employment-years and poisons the feature.
      This test fails if anyone drops the scrub: the sentinel row must yield a
      null employment_years, while a normal negative-days row converts to a
      positive year count. Encodes repo-review finding 1.
    model: stg_applications
    given:
      - input: source('home_credit', 'application_train')
        rows:
          # Sentinel applicant — "not employed".
          - {sk_id_curr: 1, target: 1, name_contract_type: null, code_gender: null, flag_own_car: null, flag_own_realty: null, cnt_children: null, amt_income_total: null, amt_credit: null, amt_annuity: null, amt_goods_price: null, name_income_type: null, name_education_type: null, name_family_status: null, days_birth: -3653, days_employed: 365243}
          # Normal applicant — employed; -1461 days = exactly 4.0 years.
          - {sk_id_curr: 2, target: 0, name_contract_type: null, code_gender: null, flag_own_car: null, flag_own_realty: null, cnt_children: null, amt_income_total: null, amt_credit: null, amt_annuity: null, amt_goods_price: null, name_income_type: null, name_education_type: null, name_family_status: null, days_birth: -1461, days_employed: -1461}
    expect:
      rows:
        - {application_id: 1, is_default: 1, age_years: 10, employment_years: null}
        - {application_id: 2, is_default: 0, age_years: 4, employment_years: 4.0}
