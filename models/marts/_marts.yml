version: 2

models:
  - name: fct_applications
    description: >
      Gold applicant-level feature mart — one row per loan application with
      cleaned attributes, rolled-up bureau credit history, and derived ratio
      features. The tested, contracted data product the PD model trains on.
    config:
      contract:
        enforced: true
    # Contract data types follow the Home Credit data dictionary and the casts
    # in the staging models; they are enforced at the first real `dbt build`
    # against the warehouse (CI parses/lints offline only — see README).
    columns:
      - name: application_id
        data_type: bigint
        description: Surrogate key of the loan application (raw SK_ID_CURR).
        data_tests:
          - not_null
          - unique
      - name: is_default
        data_type: int
        description: Target label — 1 if the client had payment difficulties, else 0.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: contract_type
        data_type: string
        description: Cash loan vs revolving loan.
      - name: income_total
        data_type: double
        description: Total declared client income.
      - name: credit_amount
        data_type: double
        description: Credit amount of the loan.
      - name: annuity_amount
        data_type: double
        description: Loan annuity.
      - name: age_years
        data_type: int
        description: Applicant age in years at application.
      - name: employment_years
        data_type: double
        description: Years employed; null where the not-employed sentinel was scrubbed.
      - name: prior_credit_count
        data_type: bigint
        description: Count of prior bureau credits; 0 when no bureau history.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: active_credit_count
        data_type: bigint
        description: Count of currently-active bureau credits.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: total_credit_debt
        data_type: double
        description: Sum of outstanding debt across bureau credits.
      - name: total_credit_overdue
        data_type: double
        description: Sum of overdue amounts across bureau credits.
      - name: max_days_overdue
        data_type: int
        description: Worst overdue duration across bureau credits, in days.
      - name: credit_to_income_ratio
        data_type: double
        description: credit_amount / income_total; null when income is null or zero.
      - name: annuity_to_income_ratio
        data_type: double
        description: annuity_amount / income_total; null when income is null or zero.

  - name: fct_installment_payments
    description: >
      Gold event-grain fact — one row per prior-credit installment payment.
      Incremental model with a Delta MERGE on payment_id: re-runs are
      idempotent and a real append only processes newer installments. The
      source is a static historical dump, so the incremental watermark is
      illustrative of the mechanics (see README honest disclaimer); the MERGE
      key is what guarantees correctness on every re-run. The unique test on
      payment_id encodes that guarantee — if it fails, the merge key is wrong.
    config:
      contract:
        enforced: true
    columns:
      - name: payment_id
        data_type: string
        description: Surrogate key of the payment event; the MERGE unique key.
        data_tests:
          - not_null
          - unique
      - name: prior_credit_id
        data_type: bigint
        description: Prior Home Credit credit the installment belongs to (SK_ID_PREV).
      - name: application_id
        data_type: bigint
        description: Application the credit belongs to (SK_ID_CURR); spans train + test.
        data_tests:
          - not_null
      - name: installment_version
        data_type: int
        description: Version of the installment calendar for the credit.
      - name: installment_number
        data_type: int
        description: Sequence number of the installment within the credit.
      - name: installment_due_day
        data_type: int
        description: Scheduled installment day (negative offset from application).
        data_tests:
          - not_null
      - name: payment_entry_day
        data_type: int
        description: Day the payment was actually entered; null if not paid.
      - name: installment_amount
        data_type: double
        description: Prescribed installment amount.
      - name: payment_amount
        data_type: double
        description: Amount actually paid for the installment; null if not paid.
      - name: payment_shortfall
        data_type: double
        description: installment_amount - payment_amount; positive = underpaid.
      - name: days_late
        data_type: int
        description: payment_entry_day - installment_due_day; positive = paid late.

  - name: fct_scored_applications
    description: >
      Gold scored-applications product — the feature mart joined to its model
      prediction and top SHAP drivers. The queryable surface for portfolio
      analytics and grounded adverse-action explanations. No enforced contract
      here (unlike fct_applications, the contracted feature product): this is a
      convenience join whose column types are inherited from already-tested,
      already-contracted upstreams.
    columns:
      - name: application_id
        description: Surrogate key of the scored application.
        data_tests:
          - not_null
          - unique
      - name: predicted_pd
        description: Model probability of default, in [0, 1].
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

unit_tests:
  - name: test_fct_applications_handles_no_bureau_and_zero_income
    description: >
      Two intents in one mart-shaped case. (1) The left join must keep an
      applicant with no bureau history, with coalesce zeroing the credit-history
      counts rather than dropping the row or leaving nulls. (2) safe_divide must
      degrade the credit/annuity-to-income ratios to null when income is zero,
      never erroring or emitting infinity. App 1 has bureau history and non-zero
      income (real ratios); App 2 has neither.
    model: fct_applications
    given:
      - input: ref('stg_applications')
        rows:
          - {application_id: 1, is_default: 0, contract_type: 'Cash loans', income_total: 10000.0, credit_amount: 30000.0, annuity_amount: 1000.0, age_years: 40, employment_years: 5.0}
          - {application_id: 2, is_default: 1, contract_type: 'Cash loans', income_total: 0.0, credit_amount: 5000.0, annuity_amount: 200.0, age_years: 30, employment_years: null}
      - input: ref('int_bureau_aggregations')
        rows:
          # Only applicant 1 has bureau history; applicant 2 is absent on purpose.
          - {application_id: 1, prior_credit_count: 3, active_credit_count: 1, total_credit_debt: 500.0, total_credit_overdue: 0.0, max_days_overdue: 12}
    expect:
      rows:
        - {application_id: 1, is_default: 0, contract_type: 'Cash loans', income_total: 10000.0, credit_amount: 30000.0, annuity_amount: 1000.0, age_years: 40, employment_years: 5.0, prior_credit_count: 3, active_credit_count: 1, total_credit_debt: 500.0, total_credit_overdue: 0.0, max_days_overdue: 12, credit_to_income_ratio: 3.0, annuity_to_income_ratio: 0.1}
        - {application_id: 2, is_default: 1, contract_type: 'Cash loans', income_total: 0.0, credit_amount: 5000.0, annuity_amount: 200.0, age_years: 30, employment_years: null, prior_credit_count: 0, active_credit_count: 0, total_credit_debt: 0.0, total_credit_overdue: 0.0, max_days_overdue: 0, credit_to_income_ratio: null, annuity_to_income_ratio: null}
